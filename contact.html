<style>
  :root{
    --ink:#101820; --paper:#EEF1F0; --card:#FFFFFF; --line:#D6DCDA;
    --slate:#425059; --teal:#0E6B5C; --teal-deep:#0A4F44;
    --mono:'IBM Plex Mono',monospace; --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--paper);
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:28px 28px;background-position:-1px -1px;}
  .wrap{max-width:720px;margin:0 auto;padding:36px 20px 80px;}
  .masthead{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:28px;flex-wrap:wrap;gap:10px;}
  .brand{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal-deep);background:#DCEDE9;padding:4px 8px;border:1px solid var(--teal);}
  nav{font-family:var(--mono);font-size:13px;display:flex;gap:18px;}
  nav a{color:var(--ink);text-decoration:none;border-bottom:2px solid transparent;}
  nav a:hover{border-bottom-color:var(--teal);}
  nav a.current{color:var(--teal-deep);border-bottom-color:var(--teal);}
  h1{font-family:var(--display);font-size:clamp(26px,5vw,38px);margin:0 0 10px;}
  .sub{color:var(--slate);font-size:15px;max-width:540px;line-height:1.6;margin-bottom:32px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:2px;padding:24px;box-shadow:4px 4px 0 rgba(16,24,32,.05);margin-bottom:16px;}
  .card .label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin-bottom:6px;}
  .card .value{font-family:var(--display);font-size:19px;}
  .card a{color:var(--ink);text-decoration:none;border-bottom:2px solid var(--teal);}
  .card a:hover{color:var(--teal-deep);}
  .wa-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;font-weight:700;font-size:15px;padding:11px 18px;border-radius:4px;text-decoration:none;margin-top:6px;}
  .wa-btn:hover{background:#1ebe5b;}
  footer{border-top:1px solid var(--line);margin-top:48px;padding-top:20px;font-family:var(--mono);font-size:12.5px;color:var(--slate);}
  footer a{color:var(--slate);}

  /* ================= PREMIUM UPGRADE LAYER ================= */
  :root{
    --teal-bright:#1FBE9C;
    --amber-bright:#E6A94E;
    --shadow-sm:0 1px 2px rgba(11,21,18,.06);
    --shadow-md:0 10px 26px -10px rgba(11,21,18,.22),0 2px 8px rgba(11,21,18,.06);
    --shadow-lg:0 26px 55px -18px rgba(11,21,18,.30),0 8px 20px rgba(11,21,18,.08);
    --grad-accent:linear-gradient(135deg,var(--teal-deep) 0%,var(--teal) 55%,var(--teal-bright) 100%);
    --grad-gold:linear-gradient(135deg,var(--amber) 0%,var(--amber-bright) 100%);
    --radius:14px;
    --radius-sm:9px;
  }
  html{scroll-behavior:smooth;}
  body{
    background-color:var(--paper);
    background-image:
      radial-gradient(1100px 480px at 6% -8%, rgba(18,135,111,.10), transparent 60%),
      radial-gradient(900px 420px at 108% 0%, rgba(201,134,47,.08), transparent 55%),
      linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:auto,auto,28px 28px,28px 28px;
    background-position:0 0,0 0,-1px -1px,-1px -1px;
  }
  .wrap{position:relative;z-index:1;}
  .masthead{
    position:sticky;top:0;z-index:80;
    margin-left:-20px;margin-right:-20px;padding-left:20px;padding-right:20px;
    background:rgba(238,241,240,.82);
    -webkit-backdrop-filter:blur(10px) saturate(140%);
    backdrop-filter:blur(10px) saturate(140%);
  }
  html[data-theme="dark"] .masthead{background:rgba(15,22,19,.82);}
  .brand,.masthead .brand,.auth-brand,.badge-privacy,.ad-box .ad-eyebrow{
    background:var(--grad-accent) !important;color:#fff !important;border:none !important;
    border-radius:999px !important;box-shadow:var(--shadow-sm);
  }
  .demo-eyebrow{border-radius:999px !important;}
  nav a{transition:color .2s ease;}
  nav a:hover{color:var(--teal-deep);}
  h1{
    background:linear-gradient(135deg,var(--ink) 15%,var(--teal-deep) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  html[data-theme="dark"] h1{background:linear-gradient(135deg,var(--ink) 15%,var(--teal-bright) 100%);-webkit-background-clip:text;background-clip:text;}
  .btn-primary{
    background:var(--grad-accent) !important;border:none !important;border-radius:var(--radius-sm) !important;
    box-shadow:var(--shadow-md);transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);filter:brightness(1.06);background:var(--grad-accent) !important;}
  .btn-primary:disabled{background:#B7BEC3 !important;box-shadow:none;transform:none;}
  .btn-ghost{border-radius:var(--radius-sm) !important;transition:transform .18s ease,box-shadow .18s ease,background .18s ease;}
  .btn-ghost:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
  button{border-radius:var(--radius-sm);transition:transform .15s ease,box-shadow .15s ease,filter .15s ease;}
  .wa-btn{border-radius:999px !important;box-shadow:var(--shadow-md);transition:transform .18s ease,box-shadow .18s ease;}
  .wa-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .card{
    border-radius:var(--radius) !important;box-shadow:var(--shadow-sm);
    transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
    position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-accent);opacity:0;transition:opacity .22s ease;}
  .card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);}
  .card:hover::before{opacity:1;}
  .section-divider{position:relative;padding-left:16px;border-top:none !important;}
  .section-divider::before{content:"";position:absolute;left:0;top:1px;bottom:1px;width:4px;border-radius:4px;background:var(--grad-accent);}
  ::selection{background:var(--teal-bright);color:#fff;}
  footer{position:relative;}
  footer::before{content:"";position:absolute;top:-1px;left:0;width:70px;height:2px;background:var(--grad-accent);}
  th{background:var(--grad-accent) !important;}
  #dropzone{border-radius:var(--radius) !important;transition:border-color .2s ease,box-shadow .2s ease,background .2s ease;}
  #dropzone:hover{border-color:var(--teal);box-shadow:var(--shadow-sm);}
  .modal,.ad-box,.auth-box{border-radius:var(--radius) !important;box-shadow:var(--shadow-lg) !important;}
  #helpFab{box-shadow:var(--shadow-lg) !important;transition:transform .18s ease,box-shadow .18s ease,background .18s ease;}
  #helpFab:hover{transform:translateY(-2px) scale(1.05);}
  .tbl-wrap{border-radius:var(--radius-sm);overflow:hidden;}
  .toggle-btn,.ad-pro-link{transition:color .18s ease;}
  a{transition:color .15s ease,border-color .15s ease;}

</style>
